version: '3.8'

services:
  app:
    build: ./app
    container_name: todo-app
    restart: unless-stopped
    volumes:
      - todo-data:/data
    networks:
      - todo-network
    environment:
      - FLASK_ENV=production

  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  todo-data:
