---
- name: Deploy DevOps ToDo Application
  hosts: prod
  become: yes
  vars:
    project_dir: /opt/devops-todo
    repo_url: https://github.com/makeloki/devops-todo.git

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - git
          - docker.io
          - docker-compose-v2
          - python3-pip
          - curl
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group
      user:
        name: "vboxuser"
        groups: docker
        append: yes

    - name: Ensure project directory exists
      file:
        path: "{{ project_dir }}"
        state: directory
        mode: '0755'

    - name: Clone/Update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: main
        force: yes
      register: git_result

    - name: Copy environment file if needed
      template:
        src: env.j2
        dest: "{{ project_dir }}/.env"
      when: false

    - name: Deploy with Docker Compose V2
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        files:
          - docker-compose.yml
        state: present
        recreate: always

    - name: Wait for application to be ready
      wait_for:
        port: 80
        host: "{{ ansible_default_ipv4.address | default('127.0.0.1') }}"
        delay: 5
        timeout: 30

    - name: Check if application responds
      uri:
        url: http://localhost
        method: GET
        status_code: 200
      register: health_check
      ignore_errors: yes

    - name: Display deployment status
      debug:
        msg:
          - "Deployment completed!"
          - "Application URL: http://{{ ansible_default_ipv4.address | default('localhost') }}"
          - "Status: {{ '✅ OK' if health_check.status == 200 else '❌ Failed' }}"
