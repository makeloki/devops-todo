name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # возможность запускать вручную

jobs:
  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible
      
      - name: Create SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
      
      - name: Create inventory file
        run: |
          mkdir -p ansible/hosts
          echo "[prod]" > ansible/hosts/inventory.ini
          echo "${{ secrets.SERVER_IP }} ansible_user=${{ secrets.SERVER_USER }} ansible_ssh_private_key_file=~/.ssh/id_rsa" >> ansible/hosts/inventory.ini
      
      - name: Run Ansible playbook
        run: |
          ansible-playbook -i ansible/hosts/inventory.ini ansible/playbooks/deploy.yml
